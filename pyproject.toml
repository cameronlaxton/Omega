[project]
name = "omega"
version = "0.1.0"
description = "Quantitative sports analytics: deterministic simulation, strategy registry, and LLM-powered research"
requires-python = ">=3.11"

dependencies = [
    # Core runtime (deterministic, no network)
    "numpy>=2.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
research = [
    "anthropic>=0.49.0",
    "openai>=1.0.0",
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.3.0",
]
api = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.27.0",
    "sse-starlette>=1.6.0",
    "redis>=5.0.0",
]
db = [
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    "psycopg2-binary>=2.9.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
