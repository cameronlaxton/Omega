services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omega}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omega}
      POSTGRES_DB: ${POSTGRES_DB:-omega}
    volumes:
      - omega-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omega} -d ${POSTGRES_DB:-omega}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  omega-postgres-data:
